groups:
  - name: shopping-mall-alerts
    rules:
      - alert: IstioHigh5xxErrorRate
        expr: >
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[1m])) by (job)
          /
          sum(rate(http_server_requests_seconds_count[1m])) by (job)
          > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate detected"
          description: "Service {{ $labels.job }} has 5xx error rate above 10% for more than 1 minute. Current value: {{ $value | humanizePercentage }}"

      - alert: HighMemoryUsage
        expr: >
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}
          > 0.85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap memory usage detected"
          description: "Service {{ $labels.job }} JVM heap usage is above 85% for more than 2 minutes. Current value: {{ $value | humanizePercentage }}"

      - alert: HighLatency
        expr: >
          histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[1m])) by (le, job))
          > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP response latency detected"
          description: "Service {{ $labels.job }} p99 response time is above 2000ms for more than 1 minute. Current value: {{ $value }}s"
