apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: shopping-mall
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootpassword
  MYSQL_USER: shopuser
  MYSQL_PASSWORD: shoppassword
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: shopping-mall
type: Opaque
stringData:
  JWT_SECRET: shopping-mall-jwt-secret-key-for-development-only
