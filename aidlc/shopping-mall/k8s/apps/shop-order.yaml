apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-order
  namespace: shopping-mall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shop-order
  template:
    metadata:
      labels:
        app: shop-order
    spec:
      containers:
        - name: shop-order
          image: shopping-mall-shop-order:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:13306/shop_order?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:19092"
            - name: PRODUCT_SERVICE_URL
              value: "http://shop-product:18081"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: shop-order
  namespace: shopping-mall
spec:
  selector:
    app: shop-order
  ports:
    - port: 18082
      targetPort: 8082
