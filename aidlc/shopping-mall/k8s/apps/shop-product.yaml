apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-product
  namespace: shopping-mall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shop-product
  template:
    metadata:
      labels:
        app: shop-product
    spec:
      containers:
        - name: shop-product
          image: shopping-mall-shop-product:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:13306/shop_product?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              cpu: 500m
              memory: 768Mi
---
apiVersion: v1
kind: Service
metadata:
  name: shop-product
  namespace: shopping-mall
spec:
  selector:
    app: shop-product
  ports:
    - port: 18081
      targetPort: 8081
